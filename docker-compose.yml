version: '3.8'

services:
  # Neo4j graph database
  neo4j:
    image: neo4j:5-community
    container_name: plywood-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/plywood2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "plywood2026", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Build environment
  builder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: plywood-builder
    volumes:
      - .:/workspace
      - build_cache:/workspace/build
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: plywood2026
      SQLITE_DB: /workspace/data/coverage.db
    working_dir: /workspace

  # Query system web UI
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: plywood-web
    ports:
      - "5000:5000"
    volumes:
      - .:/workspace
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: plywood2026
      SQLITE_DB: /workspace/data/coverage.db
      FLASK_APP: query_system/web_app.py
      FLASK_ENV: development
    working_dir: /workspace
    command: python -m flask run --host=0.0.0.0

volumes:
  neo4j_data:
  neo4j_logs:
  build_cache:
